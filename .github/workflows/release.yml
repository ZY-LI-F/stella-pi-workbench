name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            family: windows
            os: windows-latest
            script: dist:win
            artifact: stella-windows-x64
          - label: macOS Apple Silicon
            family: mac
            os: macos-latest
            script: dist:mac:arm64
            artifact: stella-macos-arm64
          - label: macOS Intel
            family: mac
            os: macos-15-intel
            script: dist:mac:x64
            artifact: stella-macos-x64

    runs-on: ${{ matrix.os }}
    env:
      CSC_LINK: ${{ matrix.family == 'mac' && secrets.MAC_CSC_LINK || secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ matrix.family == 'mac' && secrets.MAC_CSC_KEY_PASSWORD || secrets.WIN_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ matrix.family == 'mac' && secrets.APPLE_ID || '' }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.family == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
      APPLE_TEAM_ID: ${{ matrix.family == 'mac' && secrets.APPLE_TEAM_ID || '' }}
      STELLA_REQUIRE_SIGNING: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '0' }}
      STELLA_REQUIRE_NOTARIZATION: ${{ startsWith(github.ref, 'refs/tags/v') && matrix.family == 'mac' && '1' || '0' }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build distributables
        run: npm run ${{ matrix.script }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release and upload installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" release-artifacts/* --generate-notes --verify-tag
